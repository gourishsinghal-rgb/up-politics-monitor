<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Politics Monitor - Multi-Level Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141824;
            --bg-tertiary: #1e2435;
            --text-primary: #e8edf4;
            --text-secondary: #9ba3b4;
            --accent-orange: #ff6b35;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --border-color: #2d3548;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Crimson Pro', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }
        
        #map {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            z-index: 1;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent-orange);
            box-shadow: var(--shadow);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--accent-orange);
        }
        
        .view-indicator {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .stats-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--accent-orange);
            box-shadow: var(--shadow);
            z-index: 999;
            min-width: 250px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--accent-orange);
        }
        
        /* Custom Leaflet Markers */
        .custom-marker {
            background: var(--accent-orange);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.6);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .custom-marker:hover {
            transform: scale(1.2);
        }
        
        .marker-national {
            background: #dc2626;
            width: 45px;
            height: 45px;
        }
        
        .marker-state {
            background: var(--accent-blue);
            width: 38px;
            height: 38px;
        }
        
        .marker-district {
            background: var(--accent-orange);
            width: 32px;
            height: 32px;
        }
        
        /* Popup Styles */
        .leaflet-popup-content-wrapper {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--accent-orange);
            border-radius: 12px;
            padding: 0;
        }
        
        .leaflet-popup-content {
            margin: 0;
            width: 320px !important;
        }
        
        .popup-header {
            background: var(--accent-orange);
            color: white;
            padding: 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            border-radius: 10px 10px 0 0;
        }
        
        .popup-body {
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .event-item {
            padding: 10px;
            margin-bottom: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            border-left: 3px solid var(--accent-blue);
        }
        
        .event-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .event-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-secondary);
        }
        
        .leaflet-popup-tip {
            background: var(--bg-secondary);
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            padding: 30px 50px;
            border-radius: 12px;
            border: 2px solid var(--accent-orange);
            z-index: 9999;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
        }
        
        .zoom-hint {
            position: fixed;
            top: 90px;
            right: 20px;
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--accent-orange);
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 999;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">LOADING MAP...</div>
    
    <div class="header">
        <div class="logo">UP POLITICS MONITOR</div>
        <div class="view-indicator" id="viewIndicator">Loading...</div>
    </div>
    
    <div id="map"></div>
    
    <div class="zoom-hint" id="zoomHint" style="display: none;">
        💡 Click on UP to see 75 districts
    </div>
    
    <div class="stats-panel">
        <div class="stat-item">
            <span class="stat-label">Total Events:</span>
            <span class="stat-value" id="totalEvents">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">National:</span>
            <span class="stat-value" id="nationalEvents">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">States:</span>
            <span class="stat-value" id="stateEvents">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">UP Districts:</span>
            <span class="stat-value" id="districtEvents">0</span>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : '/api';
        
        let map;
        let currentView = 'india';
        let allMarkers = [];
        let markersData = [];
        
        // Initialize map
        function initMap() {
            map = L.map('map', {
                center: [23.5937, 78.9629], // India center
                zoom: 5,
                minZoom: 4,
                maxZoom: 18,
                zoomControl: true
            });
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);
            
            // Listen for zoom changes
            map.on('zoomend', handleZoomChange);
            map.on('moveend', updateViewIndicator);
            
            // Load data
            loadMarkers();
        }
        
        // Load marker data from API
        async function loadMarkers() {
            try {
                const response = await fetch(`${API_BASE}/markers`);
                markersData = await response.json();
                
                console.log('Loaded markers:', markersData);
                
                // Update stats
                updateStats();
                
                // Show markers based on current view
                updateMarkers();
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error loading markers:', error);
                document.getElementById('loading').textContent = 'ERROR LOADING DATA';
            }
        }
        
        // Update statistics
        function updateStats() {
            const stats = {
                total: 0,
                national: 0,
                state: 0,
                district: 0
            };
            
            markersData.forEach(marker => {
                stats.total += marker.count;
                if (marker.level === 'national') stats.national += marker.count;
                else if (marker.level === 'state') stats.state += marker.count;
                else if (marker.level === 'district') stats.district += marker.count;
            });
            
            document.getElementById('totalEvents').textContent = stats.total;
            document.getElementById('nationalEvents').textContent = stats.national;
            document.getElementById('stateEvents').textContent = stats.state;
            document.getElementById('districtEvents').textContent = stats.district;
        }
        
        // Handle zoom changes
        function handleZoomChange() {
            const zoom = map.getZoom();
            const center = map.getCenter();
            
            // If zoomed into UP region
            if (zoom >= 7 && isInUPRegion(center)) {
                if (currentView !== 'up') {
                    currentView = 'up';
                    updateMarkers();
                }
            } else {
                if (currentView !== 'india') {
                    currentView = 'india';
                    updateMarkers();
                }
            }
            
            updateViewIndicator();
        }
        
        // Check if view is in UP region
        function isInUPRegion(center) {
            // UP bounds approximately
            return center.lat > 24 && center.lat < 31 && 
                   center.lng > 77 && center.lng < 85;
        }
        
        // Update view indicator
        function updateViewIndicator() {
            const zoom = map.getZoom();
            if (currentView === 'india') {
                document.getElementById('viewIndicator').textContent = 
                    `🌏 INDIA VIEW (Zoom: ${zoom})`;
                document.getElementById('zoomHint').style.display = 'block';
            } else {
                document.getElementById('viewIndicator').textContent = 
                    `🗺️ UP DISTRICTS (Zoom: ${zoom})`;
                document.getElementById('zoomHint').style.display = 'none';
            }
        }
        
        // Update markers based on current view
        function updateMarkers() {
            // Clear existing markers
            allMarkers.forEach(marker => map.removeLayer(marker));
            allMarkers = [];
            
            if (currentView === 'india') {
                showIndiaView();
            } else {
                showUPView();
            }
        }
        
        // Show India-level view (states + national)
        function showIndiaView() {
            markersData.forEach(markerData => {
                // Show national and state-level markers
                if (markerData.level === 'national' || markerData.level === 'state') {
                    createMarker(markerData);
                }
            });
        }
        
        // Show UP districts view
        function showUPView() {
            markersData.forEach(markerData => {
                // Show only UP district markers
                if (markerData.level === 'district' && markerData.state === 'Uttar Pradesh') {
                    createMarker(markerData);
                }
            });
        }
        
        // Create marker
        function createMarker(markerData) {
            const markerClass = `marker-${markerData.level}`;
            const size = markerData.level === 'national' ? 45 : 
                        markerData.level === 'state' ? 38 : 32;
            
            const icon = L.divIcon({
                html: `<div class="custom-marker ${markerClass}">${markerData.count}</div>`,
                className: '',
                iconSize: [size, size],
                iconAnchor: [size/2, size/2]
            });
            
            const marker = L.marker([markerData.lat, markerData.lng], { icon });
            
            // Create popup
            const popupContent = createPopupContent(markerData);
            marker.bindPopup(popupContent, { maxWidth: 350 });
            
            // Handle click for UP marker in India view
            if (markerData.location === 'Uttar Pradesh' && currentView === 'india') {
                marker.on('click', () => {
                    map.flyTo([26.8467, 80.9462], 8, { duration: 1.5 });
                });
            }
            
            marker.addTo(map);
            allMarkers.push(marker);
        }
        
        // Create popup content
        function createPopupContent(markerData) {
            let levelLabel = markerData.level === 'national' ? '🌏 National News' :
                            markerData.level === 'state' ? '🗺️ State News' :
                            '📍 District News';
            
            let html = `
                <div class="popup-header">
                    ${levelLabel}: ${markerData.location}
                </div>
                <div class="popup-body">
                    <div style="margin-bottom: 10px; font-weight: 600; color: var(--accent-orange);">
                        ${markerData.count} Events
                    </div>
            `;
            
            // Show first 5 events
            const eventsToShow = markerData.events.slice(0, 5);
            eventsToShow.forEach(event => {
                const date = new Date(event.date);
                const timeAgo = getTimeAgo(date);
                
                html += `
                    <div class="event-item">
                        <div class="event-title">${event.title}</div>
                        <div class="event-meta">${timeAgo} • ${event.category}</div>
                    </div>
                `;
            });
            
            if (markerData.count > 5) {
                html += `<div style="text-align: center; padding: 10px; color: var(--text-secondary); font-size: 12px;">
                    +${markerData.count - 5} more events
                </div>`;
            }
            
            html += '</div>';
            return html;
        }
        
        // Get time ago string
        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays}d ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)}w ago`;
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
        });
    </script>
</body>
</html>
